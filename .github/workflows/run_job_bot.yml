name: Run Job Bot

on:
  schedule:
    - cron: "0 */12 * * *"  # every 12 hours
  workflow_dispatch: {}      # lets you trigger a run manually from the Actions tab

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to commit data/jobs.db back to the repo

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run the job bot
        env:
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python src/main.py

      - name: Commit updated seen-jobs database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/jobs.db
          git diff --staged --quiet || git commit -m "Update seen-jobs database [skip ci]"
          git push
