name: Run Job Bot

on:
  schedule:
    - cron: "0 */4 * * *"  # every 4 hours
  workflow_dispatch: {}     # lets you trigger a run manually from the Actions tab

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to commit data/jobs.db back to the repo

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run the job bot
        env:
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python src/main.py

      - name: Commit updated seen-jobs database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/jobs.db
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update seen-jobs database [skip ci]"
          # The remote can move ahead between this job starting and this step
          # running (e.g. a manual re-run overlapping another push/run). Retry
          # a few times: fetch, then reapply this commit on top of the latest
          # remote history, preferring our jobs.db if there's a conflict (it
          # already contains everything from when this run started, plus its
          # own new entries).
          for attempt in 1 2 3; do
            if git push; then
              break
            fi
            echo "Push rejected (attempt $attempt) - fetching and rebasing..."
            git fetch origin main
            git rebase -X ours origin/main
            if [ "$attempt" = "3" ]; then
              git push
            fi
          done
